<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dy 消费可视化分析</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-gradient-1: #667eea;
            --bg-gradient-2: #764ba2;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --card-bg: rgba(255, 255, 255, 0.15);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --chart-bg: rgba(255, 255, 255, 0.08);
        }
        
        [data-theme="dark"] {
            --bg-gradient-1: #1a1a2e;
            --bg-gradient-2: #16213e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(255, 255, 255, 0.08);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --chart-bg: rgba(255, 255, 255, 0.05);
        }
        
        /* 确保body滚动条可见 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            padding: 20px;
            min-height: 100vh;
            position: relative;
            transition: background 0.3s ease;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
        }

        /* 添加标签页样式 */
        .tab-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease 0.1s both;
        }
        
        .tab-btn {
            padding: 15px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            border-radius: 15px;
            color: var(--text-primary);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px var(--shadow-color);
        }
        
        .tab-btn:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 6px 20px var(--shadow-color);
        }
        
        .tab-btn.active {
            background: var(--card-bg);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 24px var(--shadow-color);
        }
        
        h1 {
            color: var(--text-primary);
            font-size: 3em;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1em;
            font-weight: 400;
        }
        
        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 8px 32px var(--shadow-color);
        }
        
        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
            background: var(--card-bg);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease 0.2s both;
        }
        
        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            color: var(--text-primary);
            box-shadow: 0 8px 32px var(--shadow-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            background-size: 200% 100%;
            animation: gradientMove 3s ease infinite;
        }
        
        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px var(--shadow-color);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .stat-icon {
            font-size: 2em;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }
        
        .stat-value {
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: -1px;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 0.6s ease 0.3s both;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 12px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 16px var(--shadow-color);
            transition: all 0.3s ease;
        }
        
        .control-group:hover {
            background: var(--card-bg);
            transform: translateY(-2px);
        }
        
        label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9em;
        }
        
        select, input[type="file"] {
            padding: 8px 12px;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            font-size: 0.9em;
            cursor: pointer;
            background: var(--glass-bg);
            color: var(--text-primary);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        select:hover, input[type="file"]:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: var(--card-bg);
        }
        
        select option {
            background: #2a2a3e;
            color: white;
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .chart-container {
            background: var(--chart-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--shadow-color);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease both;
        }
        
        .chart-container:nth-child(1) { animation-delay: 0.4s; }
        .chart-container:nth-child(2) { animation-delay: 0.5s; }
        .chart-container:nth-child(3) { animation-delay: 0.6s; }
        .chart-container:nth-child(4) { animation-delay: 0.7s; }
        
        .chart-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px var(--shadow-color);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .chart-title {
            font-size: 1.2em;
            color: var(--text-primary);
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 添加 overflow-y 确保垂直滚动条可见 */
        .table-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--shadow-color);
            overflow-x: auto;
            overflow-y: auto;
            max-height: 600px;
            animation: fadeInUp 0.6s ease 0.8s both;
        }
        
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        th {
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--glass-border);
        }
        
        th:first-child {
            border-top-left-radius: 10px;
        }
        
        th:last-child {
            border-top-right-radius: 10px;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-secondary);
        }
        
        tr {
            transition: all 0.2s ease;
        }
        
        tbody tr:hover {
            background: var(--card-bg);
        }
        
        .category-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes gradientMove {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        
        @keyframes numberRoll {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stat-value {
            animation: numberRoll 0.5s ease;
        }
        
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .theme-toggle {
                top: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* 增强滚动条的可见性 */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--glass-bg);
            border-radius: 6px;
            margin: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 6px;
            border: 2px solid transparent;
            background-clip: content-box;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.8);
            background-clip: content-box;
        }
        
        [data-theme="dark"] ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
        }
        
        [data-theme="dark"] ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    
    <div class="container">
        <div class="header">
            <h1>💰 dy 财务分析</h1>
            <div class="subtitle">收入与支出数据可视化</div>
        </div>

        <!-- 添加收入/支出切换标签 -->
        <div class="tab-container">
            <button class="tab-btn active" data-type="expense" onclick="switchType('expense')">
                📉 支出分析
            </button>
            <button class="tab-btn" data-type="income" onclick="switchType('income')">
                📈 收入分析
            </button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">💵</div>
                <div class="stat-label">总支出</div>
                <div class="stat-value" id="totalExpense">¥0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-label">日均消费</div>
                <div class="stat-value" id="avgExpense">¥0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-label">最高单日</div>
                <div class="stat-value" id="maxDay">¥0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-label">消费记录</div>
                <div class="stat-value" id="totalRecords">0</div>
            </div>
        </div>
    
        <div class="controls">
            <div class="control-group">
                <label for="categoryFilter">🏷️ 类别:</label>
                <select id="categoryFilter">
                    <option value="all">全部类别</option>
                </select>
            </div>
            <div class="control-group">
                <label for="dateRange">📅 日期:</label>
                <select id="dateRange">
                </select>
            </div>
            <div class="control-group">
                <label for="fileInput">📁 数据:</label>
                <input type="file" id="fileInput" accept=".csv,.json">
            </div>
        </div>
        
        <div class="chart-grid">
            <div class="chart-container">
                <!-- 动态标题将由JavaScript更新 -->
                <div class="chart-title" id="categoryChartTitle">📊 分类支出占比</div>
                <canvas id="categoryChart"></canvas>
            </div>
            <div class="chart-container">
                <!-- 动态标题将由JavaScript更新 -->
                <div class="chart-title" id="dailyChartTitle">📈 每日支出趋势</div>
                <canvas id="dailyChart"></canvas>
            </div>
        </div>
        
        <div class="chart-grid">
            <div class="chart-container">
                <!-- 动态标题将由JavaScript更新 -->
                <div class="chart-title" id="barChartTitle">🏆 类别支出排名</div>
                <canvas id="barChart"></canvas>
            </div>
            <div class="chart-container">
                <!-- 动态标题将由JavaScript更新 -->
                <div class="chart-title" id="weeklyChartTitle">📅 周支出对比</div>
                <canvas id="weeklyChart"></canvas>
            </div>
        </div>
        
        <div class="table-container">
            <!-- 动态标题将由JavaScript更新 -->
            <div class="chart-title" id="tableTitle">📝 详细消费记录</div>
            <table id="expenseTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>项目</th>
                        <th>金额</th>
                        <th>类别</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        // 添加收入数据和当前类型变量
        let expenses = [];
        let incomes = [];
        let charts = {};
        let currentData = expenses;
        let currentTheme = 'light';
        let currentType = 'expense'; // 当前显示类型：'expense' 或 'income'

        // 主题切换
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.querySelector('.theme-toggle').textContent = currentTheme === 'light' ? '🌙' : '☀️';
            
            // 重新渲染图表以适应新主题
            updateAll();
        }

        // 添加收入/支出切换函数
        function switchType(type) {
            currentType = type;
            currentData = type === 'expense' ? expenses : incomes;
            
            // 更新标签按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.type === type) {
                    btn.classList.add('active');
                }
            });
            
            // 重新初始化筛选器和更新所有图表
            document.getElementById('categoryFilter').innerHTML = '<option value="all">全部类别</option>';
            initFilters();
            updateAll();
        }

        // 自动加载数据 - 从./data/目录加载所有月份数据
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // 获取当前年份和月份
                const now = new Date();
                const currentYear = now.getFullYear();
                const currentMonth = now.getMonth() + 1; // 0-11 转为 1-12
                
                // 尝试加载多个月份的数据（当前月及之前几个月）
                const monthsToLoad = [];
                for (let i = 0; i < 3; i++) { // 尝试加载最近3个月
                    let year = currentYear;
                    let month = currentMonth - i;
                    if (month <= 0) {
                        month += 12;
                        year -= 1;
                    }
                    monthsToLoad.push({ year, month });
                }
                
                // 加载所有月份的支出和收入数据
                expenses = [];
                incomes = [];
                
                for (const {year, month} of monthsToLoad) {
                    const folderName = `${year}_${month}`;
                    const expenseFile = `./data/${folderName}/expense_${year}_${month}.json`;
                    const incomeFile = `./data/${folderName}/income_${year}_${month}.json`;
                    
                    // 加载支出数据
                    try {
                        const expenseRes = await fetch(expenseFile);
                        if (expenseRes.ok) {
                            const expenseData = await expenseRes.json();
                            if (expenseData.expenses && Array.isArray(expenseData.expenses)) {
                                expenseData.expenses.forEach(day => {
                                    const date = day.date.replace(/-/g, '/');
                                    day.items.forEach(item => {
                                        expenses.push([
                                            date,
                                            item.item,
                                            item.amount,
                                            item.category
                                        ]);
                                    });
                                });
                            }
                        }
                    } catch (e) {
                        console.log(`未找到支出文件: ${expenseFile}`);
                    }
                    
                    // 加载收入数据
                    try {
                        const incomeRes = await fetch(incomeFile);
                        if (incomeRes.ok) {
                            const incomeData = await incomeRes.json();
                            if (incomeData.incomes && Array.isArray(incomeData.incomes)) {
                                incomeData.incomes.forEach(day => {
                                    const date = day.date.replace(/-/g, '/');
                                    day.items.forEach(item => {
                                        incomes.push([
                                            date,
                                            item.item,
                                            item.amount,
                                            item.category
                                        ]);
                                    });
                                });
                            }
                        }
                    } catch (e) {
                        console.log(`未找到收入文件: ${incomeFile}`);
                    }
                }
                
                console.log(`成功加载 ${expenses.length} 条支出记录和 ${incomes.length} 条收入记录`);
                
            } catch (error) {
                console.error('加载数据时出错:', error);
            } finally {
                // 无论是否成功加载，都初始化界面
                currentData = currentType === 'expense' ? expenses : incomes;
                initFilters();
                updateAll();
            }

            // 文件上传
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                // 支持加载支出和收入数据
                reader.onload = function(evt) {
                    let text = evt.target.result;
                    let newData = [];
                    let dataType = 'expense'; // 默认为支出
                    
                    try {
                        if (file.name.endsWith('.json')) {
                            const jsonObj = JSON.parse(text);
                            
                            // 检测是支出还是收入数据
                            if (jsonObj.expenses && Array.isArray(jsonObj.expenses)) {
                                dataType = 'expense';
                                newData = [];
                                jsonObj.expenses.forEach(day => {
                                    const date = day.date.replace(/-/g, '/');
                                    day.items.forEach(item => {
                                        newData.push([
                                            date,
                                            item.item,
                                            item.amount,
                                            item.category
                                        ]);
                                    });
                                });
                            } else if (jsonObj.incomes && Array.isArray(jsonObj.incomes)) {
                                dataType = 'income';
                                newData = [];
                                jsonObj.incomes.forEach(day => {
                                    const date = day.date.replace(/-/g, '/');
                                    day.items.forEach(item => {
                                        newData.push([
                                            date,
                                            item.item,
                                            item.amount,
                                            item.category
                                        ]);
                                    });
                                });
                            } else if (Array.isArray(jsonObj) && jsonObj.length && Array.isArray(jsonObj[0]) && jsonObj[0].length === 4) {
                                newData = jsonObj;
                                // 根据文件名判断类型
                                dataType = file.name.includes('income') ? 'income' : 'expense';
                            }
                        } else if (file.name.endsWith('.csv')) {
                            newData = text.trim().split('\n').map(line => {
                                const [date, item, amount, category] = line.split(',');
                                return [date.trim(), item.trim(), parseFloat(amount), category.trim()];
                            });
                            dataType = file.name.includes('income') ? 'income' : 'expense';
                        }
                        
                        if (Array.isArray(newData) && newData.length && Array.isArray(newData[0]) && newData[0].length === 4) {
                            // 根据数据类型更新对应的数组
                            if (dataType === 'expense') {
                                expenses = newData;
                            } else {
                                incomes = newData;
                            }
                            
                            // 切换到对应的标签页
                            switchType(dataType);
                            
                            alert(`${dataType === 'expense' ? '支出' : '收入'}数据加载成功！共 ${newData.length} 条记录`);
                        } else {
                            alert('数据格式不正确，请检查文件内容。');
                        }
                    } catch (err) {
                        alert('文件解析失败: ' + err.message);
                    }
                };
                reader.readAsText(file, 'utf-8');
            });
        });

        // 扩展类别颜色映射，添加收入相关类别的颜色
        const categoryColors = {
            // 支出类别
            '饮食': '#FF6384',
            '服饰': '#36A2EB',
            '日常': '#FFCE56',
            '运动': '#4BC0C0',
            '水果零食': '#9966FF',
            '学习工作': '#FF9F40',
            '出行': '#E74C3C',
            '社交娱乐': '#C9CBCF',
            '医疗': '#1ABC9C',
            '个人护理': '#FF9F40',
            // 收入类别
            '其他': '#3498DB',
            '杂项': '#9B59B6',
            '工作': '#2ECC71',
            '奖金': '#F39C12',
            '兼职': '#E67E22',
            '投资': '#16A085',
            '红包': '#E74C3C',
            '礼金': '#C0392B',
            '补贴': '#8E44AD',
            '退款': '#2980B9',
            '报销': '#D35400'
        };

        function processData(data) {
            const categoryTotals = {};
            const dailyTotals = {};
            let total = 0;

            data.forEach(([date, item, amount, category]) => {
                total += amount;
                categoryTotals[category] = (categoryTotals[category] || 0) + amount;
                dailyTotals[date] = (dailyTotals[date] || 0) + amount;
            });

            return { categoryTotals, dailyTotals, total };
        }

        // 根据当前类型显示不同的统计标签
        function updateStats(data) {
            const { categoryTotals, dailyTotals, total } = processData(data);
            const maxDay = Math.max(...Object.values(dailyTotals), 0);
            const days = Object.keys(dailyTotals).length;
            
            const typeText = currentType === 'expense' ? '支出' : '收入';

            document.getElementById('totalExpense').textContent = `¥${total.toFixed(2)}`;
            document.getElementById('avgExpense').textContent = days > 0 ? `¥${(total / days).toFixed(2)}` : '¥0.00';
            document.getElementById('maxDay').textContent = `¥${maxDay.toFixed(2)}`;
            document.getElementById('totalRecords').textContent = `${data.length}条`;
            
            // 动态更新卡片标签
            document.querySelectorAll('.stat-label')[0].textContent = `总${typeText}`;
            document.querySelectorAll('.stat-label')[1].textContent = `日均${typeText}`;
            document.querySelectorAll('.stat-label')[2].textContent = `最高单日`;
            document.querySelectorAll('.stat-label')[3].textContent = `${typeText}记录`;
        }

        function getChartColors() {
            return currentTheme === 'dark' ? {
                gridColor: 'rgba(255, 255, 255, 0.1)',
                textColor: 'rgba(255, 255, 255, 0.8)'
            } : {
                gridColor: 'rgba(255, 255, 255, 0.3)',
                textColor: 'rgba(255, 255, 255, 0.9)'
            };
        }

        function createPieChart(data) {
            const { categoryTotals } = processData(data);
            const ctx = document.getElementById('categoryChart');
            const colors = getChartColors();
            
            if (charts.pie) charts.pie.destroy();

            // 为未定义的类别动态生成颜色
            const defaultColors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#E74C3C', '#1ABC9C', '#3498DB', '#9B59B6', '#2ECC71', '#F39C12'];
            let colorIndex = 0;
            const getCategoryColor = (cat) => {
                if (categoryColors[cat]) {
                    return categoryColors[cat];
                }
                const color = defaultColors[colorIndex % defaultColors.length];
                colorIndex++;
                return color;
            };

            // 饼图应用动态颜色函数
            charts.pie = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categoryTotals),
                    datasets: [{
                        data: Object.values(categoryTotals),
                        backgroundColor: Object.keys(categoryTotals).map(cat => getCategoryColor(cat)),
                        borderWidth: 3,
                        borderColor: currentTheme === 'dark' ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.5)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 15,
                                font: { size: 12 },
                                color: colors.textColor
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.label || '';
                                    const value = context.parsed || 0;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((value / total) * 100).toFixed(1);
                                    return `${label}: ¥${value.toFixed(2)} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function createLineChart(data) {
            const { dailyTotals } = processData(data);
            const ctx = document.getElementById('dailyChart');
            const colors = getChartColors();
            
            if (charts.line) charts.line.destroy();

            const dates = Object.keys(dailyTotals).sort();
            const amounts = dates.map(date => dailyTotals[date]);

            // 根据主题动态调整折线图颜色，浅色模式下使用更深的颜色
            const lineColor = currentTheme === 'dark' ? '#667eea' : '#4338ca';
            const fillColor = currentTheme === 'dark' ? 'rgba(102, 126, 234, 0.2)' : 'rgba(67, 56, 202, 0.3)';

            charts.line = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates.map(d => d.split('/')[2] + '日'),
                    // 折线图标题动态化
                    datasets: [{
                        label: currentType === 'expense' ? '每日支出' : '每日收入',
                        data: amounts,
                        borderColor: lineColor,
                        backgroundColor: fillColor,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        pointBackgroundColor: lineColor,
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    // 折线图tooltip动态化
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const typeText = currentType === 'expense' ? '支出' : '收入';
                                    return `${typeText}: ¥${context.parsed.y.toFixed(2)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: colors.gridColor },
                            ticks: {
                                color: colors.textColor,
                                callback: function(value) {
                                    return '¥' + value;
                                }
                            }
                        },
                        x: {
                            grid: { color: colors.gridColor },
                            ticks: { color: colors.textColor }
                        }
                    }
                }
            });
        }

        function createBarChart(data) {
            const { categoryTotals } = processData(data);
            const ctx = document.getElementById('barChart');
            const colors = getChartColors();
            
            if (charts.bar) charts.bar.destroy();

            const sorted = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]);

            // 为柱状图也添加动态颜色支持
            const defaultColors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#E74C3C', '#1ABC9C', '#3498DB', '#9B59B6', '#2ECC71', '#F39C12'];
            let colorIndex = 0;
            const getCategoryColor = (cat) => {
                if (categoryColors[cat]) {
                    return categoryColors[cat];
                }
                const color = defaultColors[colorIndex % defaultColors.length];
                colorIndex++;
                return color;
            };

            charts.bar = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(([cat]) => cat),
                    // 柱状图标题动态化
                    datasets: [{
                        label: currentType === 'expense' ? '支出金额' : '收入金额',
                        data: sorted.map(([, amt]) => amt),
                        backgroundColor: sorted.map(([cat]) => getCategoryColor(cat)),
                        borderWidth: 0,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    // 柱状图tooltip动态化
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const typeText = currentType === 'expense' ? '支出' : '收入';
                                    return `${typeText}: ¥${context.parsed.y.toFixed(2)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: colors.gridColor },
                            ticks: {
                                color: colors.textColor,
                                callback: function(value) {
                                    return '¥' + value;
                                }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: colors.textColor }
                        }
                    }
                }
            });
        }

        function createWeeklyChart(data) {
            const ctx = document.getElementById('weeklyChart');
            const colors = getChartColors();
            
            if (charts.weekly) charts.weekly.destroy();

            const weeks = {
                '第1周': data.filter(d => {
                    const day = parseInt(d[0].split('/')[2]);
                    return day >= 1 && day <= 7;
                }).reduce((sum, d) => sum + d[2], 0),
                '第2周': data.filter(d => {
                    const day = parseInt(d[0].split('/')[2]);
                    return day >= 8 && day <= 14;
                }).reduce((sum, d) => sum + d[2], 0),
                '第3周': data.filter(d => {
                    const day = parseInt(d[0].split('/')[2]);
                    return day >= 15 && day <= 21;
                }).reduce((sum, d) => sum + d[2], 0),
                '第4周': data.filter(d => {
                    const day = parseInt(d[0].split('/')[2]);
                    return day >= 22 && day <= 27;
                }).reduce((sum, d) => sum + d[2], 0)
            };

            charts.weekly = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(weeks),
                    // 周对比图标题动态化
                    datasets: [{
                        label: currentType === 'expense' ? '周支出' : '周收入',
                        data: Object.values(weeks),
                        backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0'],
                        borderWidth: 0,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                // tooltip文本动态化
                                label: function(context) {
                                    const typeText = currentType === 'expense' ? '支出' : '收入';
                                    return `${typeText}: ¥${context.parsed.y.toFixed(2)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: colors.gridColor },
                            ticks: {
                                color: colors.textColor,
                                callback: function(value) {
                                    return '¥' + value;
                                }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: colors.textColor }
                        }
                    }
                }
            });
        }

        // 为表格添加动态颜色支持
        function updateTable(data) {
            const tbody = document.querySelector('#expenseTable tbody');
            tbody.innerHTML = '';

            const defaultColors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#E74C3C', '#1ABC9C', '#3498DB', '#9B59B6', '#2ECC71', '#F39C12'];
            const usedCategories = {};
            let colorIndex = 0;
            
            const getCategoryColor = (cat) => {
                if (categoryColors[cat]) {
                    return categoryColors[cat];
                }
                if (!usedCategories[cat]) {
                    usedCategories[cat] = defaultColors[colorIndex % defaultColors.length];
                    colorIndex++;
                }
                return usedCategories[cat];
            };

            data.forEach(([date, item, amount, category]) => {
                const color = getCategoryColor(category);
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${date}</td>
                    <td>${item}</td>
                    <td style="font-weight: 600; color: ${color};">¥${amount.toFixed(2)}</td>
                    <td><span class="category-badge" style="background: ${color}30; color: ${color}; border: 1px solid ${color}50;">${category}</span></td>
                `;
            });
        }

        // 根据当前类型筛选对应数据
        function filterData() {
            const categoryFilter = document.getElementById('categoryFilter').value;
            const dateRange = document.getElementById('dateRange').value;

            let filtered = currentType === 'expense' ? expenses : incomes;

            if (categoryFilter !== 'all') {
                filtered = filtered.filter(d => d[3] === categoryFilter);
            }

            if (dateRange !== 'all') {
                const weekMatch = dateRange.match(/^week(\d+)$/);
                if (weekMatch) {
                    const weekNum = parseInt(weekMatch[1]);
                    const dates = [...new Set(expenses.map(d => d[0]))].sort();
                    const minDay = parseInt(dates[0].split('/')[2]);
                    const maxDay = parseInt(dates[dates.length - 1].split('/')[2]);
                    const start = minDay + (weekNum - 1) * 7;
                    const end = Math.min(start + 6, maxDay);
                    filtered = filtered.filter(d => {
                        const day = parseInt(d[0].split('/')[2]);
                        return day >= start && day <= end;
                    });
                }
            }

            currentData = filtered;
            updateAll();
        }

        // 添加动态更新所有标题的功能
        function updateAll() {
            const typeText = currentType === 'expense' ? '支出' : '收入';
            
            // 更新图表标题
            document.getElementById('categoryChartTitle').textContent = `📊 分类${typeText}占比`;
            document.getElementById('dailyChartTitle').textContent = `📈 每日${typeText}趋势`;
            document.getElementById('barChartTitle').textContent = `🏆 类别${typeText}排名`;
            document.getElementById('weeklyChartTitle').textContent = `📅 周${typeText}对比`;
            document.getElementById('tableTitle').textContent = `📝 详细${typeText === '支出' ? '消费' : typeText}记录`;
            
            updateStats(currentData);
            createPieChart(currentData);
            createLineChart(currentData);
            createBarChart(currentData);
            createWeeklyChart(currentData);
            updateTable(currentData);
        }

        // 根据当前类型初始化筛选器
        function initFilters() {
            const currentDataSource = currentType === 'expense' ? expenses : incomes;
            const categories = [...new Set(currentDataSource.map(d => d[3]))];
            const categoryFilter = document.getElementById('categoryFilter');
            categoryFilter.innerHTML = '<option value="all">全部类别</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categoryFilter.appendChild(option);
            });

            const dateRange = document.getElementById('dateRange');
            dateRange.innerHTML = '';
            if (currentDataSource.length > 0) {
                const dates = [...new Set(currentDataSource.map(d => d[0]))].sort();

                const minDate = dates[0];
                const maxDate = dates[dates.length - 1];
                const minDay = parseInt(minDate.split('/')[2]);
                const maxDay = parseInt(maxDate.split('/')[2]);
                
                const allOption = document.createElement('option');
                allOption.value = 'all';
                allOption.textContent = `全部(${minDate}~${maxDate})`;
                dateRange.appendChild(allOption);
                
                let week = 1;
                for (let d = minDay; d <= maxDay; d += 7) {
                    const start = d;
                    const end = Math.min(d + 6, maxDay);
                    const weekOption = document.createElement('option');
                    weekOption.value = `week${week}`;
                    weekOption.textContent = `第${week}周(${start}日-${end}日)`;
                    dateRange.appendChild(weekOption);
                    week++;
                }
            }

            categoryFilter.addEventListener('change', filterData);
            dateRange.addEventListener('change', filterData);
        }
    </script>
</body>
</html>
